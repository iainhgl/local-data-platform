version: 2

seeds:
  - name: jaffle_shop_customers
    description: "Jaffle Shop canonical customer seed data (dbt tutorial dataset)"
    config:
      tags: ["seeds"]
    columns:
      - name: id
        description: "Customer primary key"
        tests:
          - not_null
          - unique
      - name: first_name
        description: "Customer first name"
        tests:
          - not_null
      - name: last_name
        description: "Customer last name"
        tests:
          - not_null

  - name: jaffle_shop_orders
    description: "Jaffle Shop canonical order seed data (dbt tutorial dataset)"
    config:
      tags: ["seeds"]
    columns:
      - name: id
        description: "Order primary key"
        tests:
          - not_null
          - unique
      - name: user_id
        description: "FK to jaffle_shop_customers.id"
        tests:
          - not_null
      - name: order_date
        description: "Date order was placed"
        tests:
          - not_null
      - name: status
        description: "Order status"
        tests:
          - not_null
          - accepted_values:
              values:
                - completed
                - returned
                - return_pending
                - placed
                - shipped

  - name: jaffle_shop_payments
    description: "Jaffle Shop canonical payment seed data (dbt tutorial dataset)"
    config:
      tags: ["seeds"]
    columns:
      - name: id
        description: "Payment primary key"
        tests:
          - not_null
          - unique
      - name: order_id
        description: "FK to jaffle_shop_orders.id"
        tests:
          - not_null
      - name: payment_method
        description: "Payment method used"
        tests:
          - not_null
          - accepted_values:
              values:
                - credit_card
                - coupon
                - bank_transfer
                - gift_card
      - name: amount
        description: "Payment amount in cents"
        tests:
          - not_null
