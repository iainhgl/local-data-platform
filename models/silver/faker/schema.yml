version: 2

models:
  - name: faker_customers
    description: "Cleaned and deduplicated customer records from the Faker Bronze file source."
    columns:
      - name: customer_id
        description: "UUID primary key for the customer."
        data_type: varchar
        meta: {pii: false}
        tests:
          - unique
          - not_null
      - name: first_name
        description: "Customer first name."
        data_type: varchar
        meta: {pii: true}
      - name: last_name
        description: "Customer last name."
        data_type: varchar
        meta: {pii: true}
      - name: email
        description: "Customer email address."
        data_type: varchar
        meta: {pii: true}
      - name: phone
        description: "Customer phone number."
        data_type: varchar
        meta: {pii: true}
      - name: address
        description: "Customer street address."
        data_type: varchar
        meta: {pii: true}
      - name: city
        description: "City portion of the customer address."
        data_type: varchar
        meta: {pii: false}
      - name: country
        description: "Two-letter country code."
        data_type: varchar
        meta: {pii: false}
      - name: created_at
        description: "Timestamp when the source customer record was created."
        data_type: timestamp
        meta: {pii: false}
      - name: _dlt_load_id
        description: "dlt load batch identifier inherited from Bronze."
        data_type: varchar
        meta: {pii: false}
      - name: _dlt_id
        description: "dlt row identifier retained for lineage and auditability."
        data_type: varchar
        meta: {pii: false}
      - name: _loaded_at
        description: "Timestamp when the Silver transformation ran."
        data_type: timestamp
        meta: {pii: false}
      - name: _source
        description: "Literal source identifier for the Faker customers file."
        data_type: varchar
        meta: {pii: false}
        tests:
          - accepted_values:
              values: ['faker_customers_file']

  - name: faker_products
    description: "Cleaned and deduplicated product records from the Faker Bronze file source."
    columns:
      - name: product_id
        description: "UUID primary key for the product."
        data_type: varchar
        meta: {pii: false}
        tests:
          - unique
          - not_null
      - name: product_name
        description: "Product display name."
        data_type: varchar
        meta: {pii: false}
      - name: category
        description: "Product category label."
        data_type: varchar
        meta: {pii: false}
        tests:
          - accepted_values:
              values: ['Electronics', 'Clothing', 'Home', 'Books', 'Sports', 'Toys']
      - name: unit_price
        description: "Unit price in USD."
        data_type: double
        meta: {pii: false}
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: true
      - name: sku
        description: "Stock keeping unit code."
        data_type: varchar
        meta: {pii: false}
      - name: created_at
        description: "Timestamp when the source product record was created."
        data_type: timestamp
        meta: {pii: false}
      - name: _dlt_load_id
        description: "dlt load batch identifier inherited from Bronze."
        data_type: varchar
        meta: {pii: false}
      - name: _dlt_id
        description: "dlt row identifier retained for lineage and auditability."
        data_type: varchar
        meta: {pii: false}
      - name: _loaded_at
        description: "Timestamp when the Silver transformation ran."
        data_type: timestamp
        meta: {pii: false}
      - name: _source
        description: "Literal source identifier for the Faker products file."
        data_type: varchar
        meta: {pii: false}
        tests:
          - accepted_values:
              values: ['faker_products_file']

  - name: faker_orders
    description: "Cleaned and deduplicated order records from the Faker Bronze file source."
    columns:
      - name: order_id
        description: "UUID primary key for the order."
        data_type: varchar
        meta: {pii: false}
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Customer identifier referenced by the order."
        data_type: varchar
        meta: {pii: false}
        tests:
          - not_null
      - name: product_id
        description: "Product identifier referenced by the order."
        data_type: varchar
        meta: {pii: false}
        tests:
          - not_null
      - name: order_date
        description: "Timestamp when the order was placed."
        data_type: timestamp
        meta: {pii: false}
      - name: quantity
        description: "Number of units ordered."
        data_type: integer
        meta: {pii: false}
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              strictly: false
      - name: unit_price
        description: "Unit price captured at order time. Allows zero — promotional/free-item orders are valid; contrast with faker_products.unit_price which is strictly positive."
        data_type: double
        meta: {pii: false}
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: false  # intentional: orders may have $0 unit price (promotions); faker_products.unit_price uses strictly: true
      - name: total_amount
        description: "Extended order amount."
        data_type: double
        meta: {pii: false}
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: false
      - name: status
        description: "Current order lifecycle status."
        data_type: varchar
        meta: {pii: false}
        tests:
          - accepted_values:
              values: ['pending', 'shipped', 'delivered', 'cancelled', 'returned']
      - name: created_at
        description: "Timestamp when the source order record was created."
        data_type: timestamp
        meta: {pii: false}
      - name: _dlt_load_id
        description: "dlt load batch identifier inherited from Bronze."
        data_type: varchar
        meta: {pii: false}
      - name: _dlt_id
        description: "dlt row identifier retained for lineage and auditability."
        data_type: varchar
        meta: {pii: false}
      - name: _loaded_at
        description: "Timestamp when the Silver transformation ran."
        data_type: timestamp
        meta: {pii: false}
      - name: _source
        description: "Literal source identifier for the Faker orders file."
        data_type: varchar
        meta: {pii: false}
        tests:
          - accepted_values:
              values: ['faker_orders_file']

  - name: faker_returns
    description: "Cleaned and deduplicated return records from the Faker Bronze file source."
    columns:
      - name: return_id
        description: "UUID primary key for the return."
        data_type: varchar
        meta: {pii: false}
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Order identifier associated with the return."
        data_type: varchar
        meta: {pii: false}
        tests:
          - not_null
      - name: product_id
        description: "Product identifier associated with the return."
        data_type: varchar
        meta: {pii: false}
        tests:
          - not_null
      - name: return_date
        description: "Timestamp when the return was initiated."
        data_type: timestamp
        meta: {pii: false}
      - name: reason
        description: "Return reason code."
        data_type: varchar
        meta: {pii: false}
        tests:
          - accepted_values:
              values: ['defective', 'wrong_item', 'not_as_described', 'changed_mind', 'damaged_in_transit']
      - name: refund_amount
        description: "Refund amount issued for the return. Bronze source documents this as 50-100% of original total_amount; test uses strictly: false as a defensive floor guard rather than enforcing the upper-bound contract."
        data_type: double
        meta: {pii: false}
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: false  # intentional: floor guard only; Bronze docs say 50-100% of total_amount but percentage enforcement is out of scope
      - name: created_at
        description: "Timestamp when the source return record was created."
        data_type: timestamp
        meta: {pii: false}
      - name: _dlt_load_id
        description: "dlt load batch identifier inherited from Bronze."
        data_type: varchar
        meta: {pii: false}
      - name: _dlt_id
        description: "dlt row identifier retained for lineage and auditability."
        data_type: varchar
        meta: {pii: false}
      - name: _loaded_at
        description: "Timestamp when the Silver transformation ran."
        data_type: timestamp
        meta: {pii: false}
      - name: _source
        description: "Literal source identifier for the Faker returns file."
        data_type: varchar
        meta: {pii: false}
        tests:
          - accepted_values:
              values: ['faker_returns_file']
