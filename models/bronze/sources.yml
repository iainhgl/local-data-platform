# Bronze layer sources
# dlt owns and writes the Bronze schema; dbt reads Bronze via {{ source() }} only.
# Do NOT add .sql model files to this directory.
version: 2

sources:
  - name: faker_file
    description: "Synthetic e-commerce data generated by Faker, loaded to Bronze by dlt (Story 2.2)"
    schema: bronze
    loaded_at_field: created_at
    freshness:
      warn_after: {count: 30, period: day}
      error_after: {count: 90, period: day}
    tables:
      - name: customers
        description: "Synthetic customer records with PII fields"
        columns:
          - name: customer_id
            description: "UUID primary key"
            data_type: varchar
            meta: {pii: false}
          - name: first_name
            description: "Customer first name — PII"
            data_type: varchar
            meta: {pii: true}
          - name: last_name
            description: "Customer last name — PII"
            data_type: varchar
            meta: {pii: true}
          - name: email
            description: "Customer email address — PII"
            data_type: varchar
            meta: {pii: true}
          - name: phone
            description: "Customer phone number — PII"
            data_type: varchar
            meta: {pii: true}
          - name: address
            description: "Street address — PII"
            data_type: varchar
            meta: {pii: true}
          - name: city
            description: "City name"
            data_type: varchar
            meta: {pii: false}
          - name: country
            description: "2-letter ISO country code"
            data_type: varchar
            meta: {pii: false}
          - name: created_at
            description: "Record creation timestamp"
            data_type: timestamp
            meta: {pii: false}
          - name: _dlt_load_id
            description: "dlt load batch identifier — do not rename"
            data_type: varchar
            meta: {pii: false}
          - name: _dlt_id
            description: "dlt row-level hash — unique key for incremental loads — do not rename"
            data_type: varchar
            meta: {pii: false}

      - name: products
        description: "Synthetic product catalogue"
        columns:
          - name: product_id
            description: "UUID primary key"
            data_type: varchar
            meta: {pii: false}
          - name: product_name
            description: "Product display name"
            data_type: varchar
            meta: {pii: false}
          - name: category
            description: "Product category: Electronics, Clothing, Home, Books, Sports, Toys"
            data_type: varchar
            meta: {pii: false}
          - name: unit_price
            description: "Price per unit in USD"
            data_type: double precision
            meta: {pii: false}
          - name: sku
            description: "Stock keeping unit code"
            data_type: varchar
            meta: {pii: false}
          - name: created_at
            description: "Record creation timestamp"
            data_type: timestamp
            meta: {pii: false}
          - name: _dlt_load_id
            description: "dlt load batch identifier"
            data_type: varchar
            meta: {pii: false}
          - name: _dlt_id
            description: "dlt row-level hash"
            data_type: varchar
            meta: {pii: false}

      - name: orders
        description: "Synthetic order records — FK to customers and products"
        columns:
          - name: order_id
            description: "UUID primary key"
            data_type: varchar
            meta: {pii: false}
          - name: customer_id
            description: "FK to bronze.customers.customer_id"
            data_type: varchar
            meta: {pii: false}
          - name: product_id
            description: "FK to bronze.products.product_id"
            data_type: varchar
            meta: {pii: false}
          - name: order_date
            description: "Date order was placed"
            data_type: timestamp
            meta: {pii: false}
          - name: quantity
            description: "Number of units ordered"
            data_type: integer
            meta: {pii: false}
          - name: unit_price
            description: "Unit price at time of order"
            data_type: double precision
            meta: {pii: false}
          - name: total_amount
            description: "quantity x unit_price"
            data_type: double precision
            meta: {pii: false}
          - name: status
            description: "Order status: pending, shipped, delivered, cancelled, returned"
            data_type: varchar
            meta: {pii: false}
          - name: created_at
            description: "Record creation timestamp"
            data_type: timestamp
            meta: {pii: false}
          - name: _dlt_load_id
            description: "dlt load batch identifier"
            data_type: varchar
            meta: {pii: false}
          - name: _dlt_id
            description: "dlt row-level hash"
            data_type: varchar
            meta: {pii: false}

      - name: returns
        description: "Synthetic return records — only for delivered/returned orders"
        columns:
          - name: return_id
            description: "UUID primary key"
            data_type: varchar
            meta: {pii: false}
          - name: order_id
            description: "FK to bronze.orders.order_id (delivered/returned orders only)"
            data_type: varchar
            meta: {pii: false}
          - name: product_id
            description: "FK to bronze.products.product_id"
            data_type: varchar
            meta: {pii: false}
          - name: return_date
            description: "Date return was initiated"
            data_type: timestamp
            meta: {pii: false}
          - name: reason
            description: "Return reason: defective, wrong_item, not_as_described, changed_mind, damaged_in_transit"
            data_type: varchar
            meta: {pii: false}
          - name: refund_amount
            description: "Refund amount in USD (50-100% of original total_amount)"
            data_type: double precision
            meta: {pii: false}
          - name: created_at
            description: "Record creation timestamp"
            data_type: timestamp
            meta: {pii: false}
          - name: _dlt_load_id
            description: "dlt load batch identifier"
            data_type: varchar
            meta: {pii: false}
          - name: _dlt_id
            description: "dlt row-level hash"
            data_type: varchar
            meta: {pii: false}

  - name: jsonplaceholder
    description: "JSONPlaceholder public REST API data loaded to Bronze by dlt (Story 2.3). Posts and users only — not referenced by Silver models."
    schema: bronze
    tables:
      - name: posts
        description: "JSONPlaceholder posts — 100 records, fixed dataset"
        columns:
          - name: id
            description: "Post primary key (integer)"
            data_type: bigint
            meta: {pii: false}
          - name: user_id
            description: "FK to users.id (dlt snake_cases userId to user_id)"
            data_type: bigint
            meta: {pii: false}
          - name: title
            description: "Post title"
            data_type: varchar
            meta: {pii: false}
          - name: body
            description: "Post body text"
            data_type: varchar
            meta: {pii: false}
          - name: _dlt_load_id
            description: "dlt load batch identifier"
            data_type: varchar
            meta: {pii: false}
          - name: _dlt_id
            description: "dlt row-level hash"
            data_type: varchar
            meta: {pii: false}

      - name: users
        description: "JSONPlaceholder users — 10 records. Nested address/company fields are dlt-flattened into address__* and company__* columns (not declared here)."
        columns:
          - name: id
            description: "User primary key (integer)"
            data_type: bigint
            meta: {pii: false}
          - name: name
            description: "Full name — PII"
            data_type: varchar
            meta: {pii: true}
          - name: username
            description: "Username handle"
            data_type: varchar
            meta: {pii: false}
          - name: email
            description: "Email address — PII"
            data_type: varchar
            meta: {pii: true}
          - name: phone
            description: "Phone number — PII"
            data_type: varchar
            meta: {pii: true}
          - name: website
            description: "Personal website URL"
            data_type: varchar
            meta: {pii: false}
          - name: _dlt_load_id
            description: "dlt load batch identifier"
            data_type: varchar
            meta: {pii: false}
          - name: _dlt_id
            description: "dlt row-level hash"
            data_type: varchar
            meta: {pii: false}
