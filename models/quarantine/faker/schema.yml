version: 2

models:
  - name: faker_customers_failed
    description: "Rejected customer records from bronze.customers that failed the Silver completeness rules."
    columns:
      - name: customer_id
        description: "UUID primary key from the Bronze customer record."
        data_type: varchar
        meta: {pii: false}
      - name: first_name
        description: "Customer first name from the rejected source record."
        data_type: varchar
        meta: {pii: true}
      - name: last_name
        description: "Customer last name from the rejected source record."
        data_type: varchar
        meta: {pii: true}
      - name: email
        description: "Customer email address from the rejected source record."
        data_type: varchar
        meta: {pii: true}
      - name: phone
        description: "Customer phone number from the rejected source record."
        data_type: varchar
        meta: {pii: true}
      - name: address
        description: "Street address from the rejected source record."
        data_type: varchar
        meta: {pii: true}
      - name: city
        description: "City from the rejected source record."
        data_type: varchar
        meta: {pii: false}
      - name: country
        description: "Two-letter country code from the rejected source record."
        data_type: varchar
        meta: {pii: false}
      - name: created_at
        description: "Timestamp when the Bronze customer record was created."
        data_type: timestamp
        meta: {pii: false}
      - name: _dlt_load_id
        description: "dlt load batch identifier inherited from Bronze."
        data_type: varchar
        meta: {pii: false}
      - name: _dlt_id
        description: "dlt row-level hash for the rejected customer record."
        data_type: varchar
        meta: {pii: false}
        tests:
          - not_null
      - name: _failed_reason
        description: "Human-readable reason describing the first validation rule that failed."
        data_type: varchar
        meta: {pii: false}
        tests:
          - not_null
      - name: _source
        description: "Literal source identifier for the Faker customers file."
        data_type: varchar
        meta: {pii: false}
      - name: _failed_at
        description: "Timestamp when the record was written to quarantine."
        data_type: timestamp
        meta: {pii: false}

