version: 2

models:
  - name: fct_orders
    description: "Fact table for orders enriched with return data."
    config:
      contract:
        enforced: true
    columns:
      - name: order_id
        description: "UUID primary key for the order."
        data_type: varchar
        meta: {pii: false}
        constraints:
          - type: not_null
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Customer identifier referenced by the order."
        data_type: varchar
        meta: {pii: false}
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: product_id
        description: "Product identifier referenced by the order."
        data_type: varchar
        meta: {pii: false}
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: order_date
        description: "Timestamp when the order was placed."
        data_type: timestamp with time zone
        meta: {pii: false}
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: quantity
        description: "Number of units ordered."
        data_type: bigint
        meta: {pii: false}
      - name: unit_price
        description: "Unit price captured at order time."
        data_type: double precision
        meta: {pii: false}
      - name: total_amount
        description: "Extended order amount."
        data_type: double precision
        meta: {pii: false}
      - name: status
        description: "Current order lifecycle status."
        data_type: varchar
        meta: {pii: false}
      - name: created_at
        description: "Timestamp when the source order record was created."
        data_type: timestamp with time zone
        meta: {pii: false}
      - name: return_id
        description: "Return identifier associated with the order, if present."
        data_type: varchar
        meta: {pii: false}
      - name: return_date
        description: "Timestamp when the related return was initiated, if present."
        data_type: timestamp with time zone
        meta: {pii: false}
      - name: return_reason
        description: "Return reason inherited from the Silver returns model."
        data_type: varchar
        meta: {pii: false}
      - name: refund_amount
        description: "Refund amount issued for the return, if present."
        data_type: double precision
        meta: {pii: false}
      - name: _dlt_load_id
        description: "dlt load batch identifier inherited from the Silver orders model."
        data_type: varchar
        meta: {pii: false}
      - name: _dlt_id
        description: "Stable dlt row hash inherited from the Silver orders model."
        data_type: varchar
        meta: {pii: false}
      - name: _source
        description: "Literal source identifier for the Gold fact model."
        data_type: varchar
        meta: {pii: false}
        tests:
          - accepted_values:
              values: ['fct_orders']
      - name: has_return
        description: "TRUE when a return record exists for the order."
        data_type: boolean
        meta: {pii: false}
      - name: _loaded_at
        description: "Timestamp when the Gold transformation ran."
        data_type: timestamp with time zone
        meta: {pii: false}
