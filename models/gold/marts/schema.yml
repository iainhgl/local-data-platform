version: 2

models:
  - name: orders_mart
    description: "Denormalized Gold mart combining order facts with customer and product attributes."
    config:
      contract:
        enforced: true
    columns:
      - name: order_id
        description: "UUID primary key for the order."
        data_type: varchar
        meta: {pii: false}
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Customer identifier referenced by the order."
        data_type: varchar
        meta: {pii: false}
      - name: product_id
        description: "Product identifier referenced by the order."
        data_type: varchar
        meta: {pii: false}
      - name: order_date
        description: "Timestamp when the order was placed."
        data_type: timestamp with time zone
        meta: {pii: false}
      - name: quantity
        description: "Number of units ordered."
        data_type: bigint
        meta: {pii: false}
      - name: unit_price
        description: "Unit price captured at order time."
        data_type: double
        meta: {pii: false}
      - name: total_amount
        description: "Extended order amount."
        data_type: double
        meta: {pii: false}
      - name: status
        description: "Current order lifecycle status."
        data_type: varchar
        meta: {pii: false}
      - name: created_at
        description: "Timestamp when the source order record was created."
        data_type: timestamp with time zone
        meta: {pii: false}
      - name: has_return
        description: "TRUE when a return record exists for the order."
        data_type: boolean
        meta: {pii: false}
      - name: return_id
        description: "Return identifier associated with the order, if present."
        data_type: varchar
        meta: {pii: false}
      - name: return_date
        description: "Timestamp when the related return was initiated, if present."
        data_type: timestamp with time zone
        meta: {pii: false}
      - name: return_reason
        description: "Return reason inherited from the Gold orders fact."
        data_type: varchar
        meta: {pii: false}
      - name: refund_amount
        description: "Refund amount issued for the return, if present."
        data_type: double
        meta: {pii: false}
      - name: first_name
        description: "Customer first name."
        data_type: varchar
        meta: {pii: true}
      - name: last_name
        description: "Customer last name."
        data_type: varchar
        meta: {pii: true}
      - name: email
        description: "Customer email address."
        data_type: varchar
        meta: {pii: true}
      - name: city
        description: "City portion of the customer address."
        data_type: varchar
        meta: {pii: false}
      - name: country
        description: "Two-letter country code for the customer."
        data_type: varchar
        meta: {pii: false}
      - name: product_name
        description: "Product display name."
        data_type: varchar
        meta: {pii: false}
      - name: category
        description: "Product category label."
        data_type: varchar
        meta: {pii: false}
      - name: sku
        description: "Stock keeping unit code."
        data_type: varchar
        meta: {pii: false}
      - name: _dlt_load_id
        description: "dlt load batch identifier inherited from the Gold orders fact."
        data_type: varchar
        meta: {pii: false}
      - name: _source
        description: "Literal source identifier for the Gold mart model."
        data_type: varchar
        meta: {pii: false}
        tests:
          - accepted_values:
              values: ['orders_mart']
      - name: _loaded_at
        description: "Timestamp when the Gold mart transformation ran."
        data_type: timestamp with time zone
        meta: {pii: false}
